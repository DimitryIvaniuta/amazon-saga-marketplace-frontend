name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run security:audit
      - run: npm run check
      - run: npm run security:sbom
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-build-coverage-and-sbom
          path: |
            dist
            coverage
            sbom.cdx.json
          if-no-files-found: error
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: amazon-saga-marketplace-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify immutable runtime profile
        run: |
          docker run --detach --name frontend-ci \
            --read-only --tmpfs /tmp --tmpfs /etc/nginx/conf.d --tmpfs /var/cache/nginx \
            --cap-drop ALL --security-opt no-new-privileges \
            -p 4173:8080 amazon-saga-marketplace-frontend:ci
          trap 'docker rm --force frontend-ci' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/healthz; then exit 0; fi
            sleep 1
          done
          docker logs frontend-ci
          exit 1
